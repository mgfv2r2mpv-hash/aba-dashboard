<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ABA Schedule Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        touch-action: manipulation;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f5f5f5;
      }

      #root {
        min-height: 100vh;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }

      /* Calendar styles */
      .rbc-calendar {
        font-size: 14px;
      }

      .rbc-header {
        padding: 12px 4px;
        font-weight: 600;
        background-color: #f9f9f9;
      }

      .rbc-today {
        background-color: #f0f7ff;
      }

      .rbc-event {
        padding: 2px 5px;
      }

      .rbc-event-label {
        font-size: 11px;
      }

      .rbc-event-content {
        white-space: normal;
      }

      /* Supervision event (green) */
      .rbc-event.supervision {
        background-color: #10b981;
      }

      /* Parent training event (blue) */
      .rbc-event.parent-training {
        background-color: #3b82f6;
      }

      /* Client session event (purple) */
      .rbc-event.client-session {
        background-color: #8b5cf6;
      }

      /* Task event (gray) */
      .rbc-event.task {
        background-color: #6b7280;
      }

      /* Fixed event (red border) */
      .rbc-event.fixed {
        border: 2px solid #dc2626;
        border-style: solid;
      }

      /* Conflict warning (orange) */
      .rbc-event.conflict {
        background-color: #f97316;
        opacity: 0.8;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CCSauf5V.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
